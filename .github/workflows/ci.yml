# ci.yml (legacy shim)
name: CICD-Databricks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrated_notice:
    name: migrated-notice
    runs-on: ubuntu-latest
    steps:
      - name: Print migration notice
        run: |
          echo "This legacy workflow has been superseded."
          echo "Use '.github/workflows/pr-checks.yml' for pull-request checks."
          echo "Use '.github/workflows/deploy.yml' for environment deployments."
